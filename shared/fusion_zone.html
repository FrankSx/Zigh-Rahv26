<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ ZIGH x RAVEE // FUSION ZONE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&family=Luckiest+Guy&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            overflow: hidden;
            cursor: crosshair;
        }
        #game-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
        }
        .ui-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
        }
        .title {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'VT323', monospace;
            font-size: 48px;
            background: linear-gradient(45deg, #00ff41, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(0,255,65,0.5);
            animation: glow 2s ease-in-out infinite;
        }
        @keyframes glow {
            0%, 100% { text-shadow: 0 0 30px rgba(0,255,65,0.5); }
            50% { text-shadow: 0 0 50px rgba(0,255,65,0.8); }
        }
        .subtitle {
            position: absolute;
            top: 90px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Luckiest Guy', cursive;
            font-size: 24px;
            color: #fff;
            text-shadow: 2px 2px 0 #000;
        }
        .instructions {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            padding: 20px 40px;
            border-radius: 15px;
            border: 2px solid #00ff41;
            color: #fff;
            font-family: 'VT323', monospace;
            font-size: 18px;
            text-align: center;
        }
        .win-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 100;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 1s;
        }
        .win-overlay.show {
            display: flex;
            opacity: 1;
        }
        .win-overlay h1 {
            font-family: 'Luckiest Guy', cursive;
            font-size: 72px;
            background: linear-gradient(45deg, #ff6b6b, #ffd700, #00ff41, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: rainbow 3s linear infinite;
            text-align: center;
            margin-bottom: 30px;
        }
        @keyframes rainbow {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }
        .win-overlay p {
            font-family: 'VT323', monospace;
            font-size: 32px;
            color: #fff;
            text-align: center;
        }
    </style>
</head>
<body>
    <canvas id="game-canvas"></canvas>

    <div class="ui-layer">
        <div class="title">⚡ ZIGH x RAVEE ⚡</div>
        <div class="subtitle">Terminal Hacker + Obby Master</div>
        <div class="instructions">
            CLICK to spawn characters • COLLECT 20 COINS to win!<br>
            🐻🎮🪙
        </div>
    </div>

    <div class="win-overlay" id="win-overlay">
        <h1>🎂 HAPPY BIRTHDAY<br>ZIGH & RAVEE! 🎂</h1>
        <p>2026 FUSION COMPLETE!</p>
        <p style="font-size: 24px; margin-top: 20px; color: #888;">From the 13th hour // frankSx</p>
        <p style="font-size: 48px; margin-top: 30px;">🐻🏃🎮🎉🎁🏆</p>
    </div>

    <script>
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let animatronics = [];
        let coins = [];
        let particles = [];
        let score = 0;
        let gameWon = false;

        const chars = ['🐻', '🐰', '🐔', '🦊', '🤖', '🏃', '🎮', '🕹️'];

        class Animatronic {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.type = chars[Math.floor(Math.random() * chars.length)];
                this.vx = (Math.random() - 0.5) * 6;
                this.vy = (Math.random() - 0.5) * 6;
                this.size = 50;
                this.rotation = 0;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.rotation += 0.05;
                if (this.x < 0 || this.x > canvas.width - this.size) this.vx *= -1;
                if (this.y < 0 || this.y > canvas.height - this.size) this.vy *= -1;
            }
            draw() {
                ctx.save();
                ctx.translate(this.x + this.size/2, this.y + this.size/2);
                ctx.rotate(this.rotation);
                ctx.font = `${this.size}px Arial`;
                ctx.textAlign = 'center';
                ctx.fillText(this.type, 0, 0);
                ctx.restore();
            }
        }

        class Coin {
            constructor() {
                this.x = Math.random() * (canvas.width - 50) + 25;
                this.y = Math.random() * (canvas.height - 50) + 25;
                this.collected = false;
                this.bob = Math.random() * Math.PI * 2;
            }
            update() {
                this.bob += 0.05;
            }
            draw() {
                if (this.collected) return;
                const bobY = Math.sin(this.bob) * 5;
                ctx.font = '35px Arial';
                ctx.fillText('🪙', this.x, this.y + bobY);
                ctx.shadowColor = '#FFD700';
                ctx.shadowBlur = 15;
                ctx.fillText('🪙', this.x, this.y + bobY);
                ctx.shadowBlur = 0;
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 10;
                this.vy = (Math.random() - 0.5) * 10;
                this.life = 1;
                this.color = color;
                this.size = Math.random() * 8 + 2;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.2;
                this.life -= 0.02;
            }
            draw() {
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y, this.size, this.size);
                ctx.globalAlpha = 1;
            }
        }

        for (let i = 0; i < 20; i++) coins.push(new Coin());
        for (let i = 0; i < 3; i++) animatronics.push(new Animatronic(Math.random() * canvas.width, Math.random() * canvas.height));

        canvas.addEventListener('click', (e) => {
            if (gameWon) return;
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            coins.forEach(coin => {
                if (!coin.collected) {
                    const dx = x - coin.x;
                    const dy = y - coin.y;
                    if (Math.sqrt(dx*dx + dy*dy) < 40) {
                        coin.collected = true;
                        score += 10;
                        for (let i = 0; i < 10; i++) particles.push(new Particle(coin.x, coin.y, '#FFD700'));
                    }
                }
            });

            if (animatronics.length < 15) {
                animatronics.push(new Animatronic(x, y));
                for (let i = 0; i < 8; i++) particles.push(new Particle(x, y, '#00ff41'));
            }
        });

        function drawBackground() {
            const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
            grad.addColorStop(0, '#1a1a2e');
            grad.addColorStop(0.5, '#16213e');
            grad.addColorStop(1, '#0f3460');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.strokeStyle = 'rgba(0, 255, 65, 0.1)';
            ctx.lineWidth = 1;
            for (let x = 0; x < canvas.width; x += 50) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }
            for (let y = 0; y < canvas.height; y += 50) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }
        }

        function drawScore() {
            ctx.font = '24px "VT323"';
            ctx.fillStyle = '#00ff41';
            ctx.textAlign = 'left';
            ctx.fillText(`SCORE: ${score}`, 30, 150);
            const collected = coins.filter(c => c.collected).length;
            ctx.fillText(`COINS: ${collected}/20`, 30, 180);
        }

        function checkWin() {
            const collected = coins.filter(c => c.collected).length;
            if (collected >= 20 && !gameWon) {
                gameWon = true;
                document.getElementById('win-overlay').classList.add('show');
            }
        }

        function gameLoop() {
            drawBackground();

            coins.forEach(coin => { coin.update(); coin.draw(); });
            animatronics.forEach(anim => { anim.update(); anim.draw(); });

            particles = particles.filter(p => {
                p.update();
                p.draw();
                return p.life > 0;
            });

            drawScore();
            checkWin();

            if (coins.filter(c => !c.collected).length < 5 && Math.random() < 0.02) {
                coins.push(new Coin());
            }

            requestAnimationFrame(gameLoop);
        }

        gameLoop();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
