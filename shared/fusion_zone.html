<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐻🎮 ZIGH x RAHV // FUSION ZONE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Luckiest+Guy&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            overflow: hidden;
            cursor: crosshair;
        }
        #game-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
        }
        .ui-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
        }
        .title {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Press Start 2P', cursive;
            font-size: 24px;
            color: #ff6b35;
            text-shadow: 0 0 20px #ff6b35, 4px 4px 0 #764ba2;
            text-align: center;
            animation: glow 2s ease-in-out infinite;
        }
        @keyframes glow {
            0%, 100% { text-shadow: 0 0 20px #ff6b35, 4px 4px 0 #764ba2; }
            50% { text-shadow: 0 0 40px #ff6b35, 4px 4px 0 #764ba2; }
        }
        .subtitle {
            position: absolute;
            top: 70px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Luckiest Guy', cursive;
            font-size: 20px;
            color: #fff;
            text-shadow: 2px 2px 0 #000;
        }
        .instructions {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            padding: 20px 40px;
            border-radius: 15px;
            border: 3px solid #ff6b35;
            color: #fff;
            font-family: 'Press Start 2P', cursive;
            font-size: 12px;
            text-align: center;
            line-height: 2;
        }
        .birthday-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 1s;
        }
        .birthday-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }
        .birthday-overlay h1 {
            font-family: 'Luckiest Guy', cursive;
            font-size: 64px;
            background: linear-gradient(45deg, #ff6b35, #ffd700, #00ff00, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-align: center;
            animation: rainbow 3s linear infinite;
            margin-bottom: 30px;
        }
        @keyframes rainbow {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }
        .birthday-overlay p {
            font-family: 'Press Start 2P', cursive;
            font-size: 20px;
            color: #fff;
            text-align: center;
            line-height: 2;
            text-shadow: 2px 2px 0 #000;
        }
        .emoji-rain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 99;
        }
    </style>
</head>
<body>
    <canvas id="game-canvas"></canvas>

    <div class="ui-layer">
        <div class="title">🐻 ZIGH x RAHV 🎮</div>
        <div class="subtitle">FNAF Security Guard + Roblox Obby Master</div>
        <div class="instructions">
            CLICK TO SPAWN ANIMATRONICS<br>
            COLLECT COINS FOR POINTS<br>
            SURVIVE THE NIGHT!
        </div>
    </div>

    <div class="birthday-overlay" id="birthday-overlay">
        <h1>🎂 HAPPY BIRTHDAY<br>ZIGH & RAHV! 🎂</h1>
        <p>2026 LEVEL COMPLETE!</p>
        <p style="font-size: 16px; margin-top: 20px; color: #aaa;">From the 13th hour // frankSx</p>
        <p style="font-size: 24px; margin-top: 30px;">🐻🎮🎉🎁🏆🎂🎈</p>
    </div>

    <div class="emoji-rain" id="emoji-rain"></div>

    <script>
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // Game state
        let animatronics = [];
        let coins = [];
        let particles = [];
        let score = 0;
        let gameTime = 0;
        let gameWon = false;

        const animatronicTypes = ['🐻', '🐰', '🐔', '🦊', '🤖', '🎮', '🕹️', '👾'];

        class Animatronic {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.type = animatronicTypes[Math.floor(Math.random() * animatronicTypes.length)];
                this.vx = (Math.random() - 0.5) * 4;
                this.vy = (Math.random() - 0.5) * 4;
                this.size = 40 + Math.random() * 20;
                this.rotation = 0;
                this.rotationSpeed = (Math.random() - 0.5) * 0.1;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.rotation += this.rotationSpeed;

                // Bounce off walls
                if (this.x < 0 || this.x > canvas.width - this.size) this.vx *= -1;
                if (this.y < 0 || this.y > canvas.height - this.size) this.vy *= -1;

                // Keep in bounds
                this.x = Math.max(0, Math.min(canvas.width - this.size, this.x));
                this.y = Math.max(0, Math.min(canvas.height - this.size, this.y));
            }

            draw() {
                ctx.save();
                ctx.translate(this.x + this.size/2, this.y + this.size/2);
                ctx.rotate(this.rotation);
                ctx.font = `${this.size}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(this.type, 0, 0);

                // Glow effect
                ctx.shadowColor = '#ff6b35';
                ctx.shadowBlur = 20;
                ctx.fillText(this.type, 0, 0);
                ctx.shadowBlur = 0;
                ctx.restore();
            }
        }

        class Coin {
            constructor() {
                this.x = Math.random() * (canvas.width - 50) + 25;
                this.y = Math.random() * (canvas.height - 50) + 25;
                this.collected = false;
                this.bobOffset = Math.random() * Math.PI * 2;
            }

            update() {
                this.bobOffset += 0.05;
            }

            draw() {
                if (this.collected) return;
                const bobY = Math.sin(this.bobOffset) * 5;
                ctx.font = '30px Arial';
                ctx.fillText('🪙', this.x, this.y + bobY);

                // Glow
                ctx.shadowColor = '#FFD700';
                ctx.shadowBlur = 15;
                ctx.fillText('🪙', this.x, this.y + bobY);
                ctx.shadowBlur = 0;
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 8;
                this.vy = (Math.random() - 0.5) * 8;
                this.life = 1;
                this.color = color;
                this.size = Math.random() * 6 + 2;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.2;
                this.life -= 0.02;
            }

            draw() {
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y, this.size, this.size);
                ctx.globalAlpha = 1;
            }
        }

        // Initialize coins
        for (let i = 0; i < 20; i++) {
            coins.push(new Coin());
        }

        // Spawn initial animatronics
        for (let i = 0; i < 3; i++) {
            animatronics.push(new Animatronic(
                Math.random() * canvas.width,
                Math.random() * canvas.height
            ));
        }

        // Click to spawn
        canvas.addEventListener('click', (e) => {
            if (gameWon) return;

            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            // Check coin collection
            coins.forEach(coin => {
                if (!coin.collected) {
                    const dx = x - coin.x;
                    const dy = y - coin.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 40) {
                        coin.collected = true;
                        score += 10;

                        // Sparkles
                        for (let i = 0; i < 10; i++) {
                            particles.push(new Particle(coin.x, coin.y, '#FFD700'));
                        }
                    }
                }
            });

            // Spawn animatronic
            if (animatronics.length < 20) {
                animatronics.push(new Animatronic(x, y));

                // Spawn particles
                for (let i = 0; i < 8; i++) {
                    particles.push(new Particle(x, y, '#ff6b35'));
                }
            }
        });

        function drawBackground() {
            // Gradient background
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#1a1a2e');
            gradient.addColorStop(0.5, '#16213e');
            gradient.addColorStop(1, '#0f3460');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Grid pattern
            ctx.strokeStyle = 'rgba(255, 107, 53, 0.1)';
            ctx.lineWidth = 1;
            const gridSize = 50;
            for (let x = 0; x < canvas.width; x += gridSize) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }
            for (let y = 0; y < canvas.height; y += gridSize) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }
        }

        function drawScore() {
            ctx.font = '20px "Press Start 2P"';
            ctx.fillStyle = '#fff';
            ctx.textAlign = 'left';
            ctx.fillText(`SCORE: ${score}`, 30, 120);
            ctx.fillText(`CREATURES: ${animatronics.length}`, 30, 150);
        }

        function checkWin() {
            const collectedCoins = coins.filter(c => c.collected).length;
            if (collectedCoins >= 20 && !gameWon) {
                gameWon = true;
                document.getElementById('birthday-overlay').classList.add('show');
                startEmojiRain();
            }
        }

        function startEmojiRain() {
            const rain = document.getElementById('emoji-rain');
            const emojis = ['🎂', '🎁', '🎈', '🎉', '🐻', '🎮', '🏆', '🪙', '✨'];

            setInterval(() => {
                const emoji = document.createElement('div');
                emoji.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                emoji.style.position = 'absolute';
                emoji.style.left = Math.random() * 100 + '%';
                emoji.style.top = '-50px';
                emoji.style.fontSize = (30 + Math.random() * 20) + 'px';
                emoji.style.animation = `fall ${3 + Math.random() * 2}s linear forwards`;
                rain.appendChild(emoji);

                setTimeout(() => emoji.remove(), 5000);
            }, 200);
        }

        // Add falling animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes fall {
                to {
                    transform: translateY(${window.innerHeight + 100}px) rotate(360deg);
                }
            }
        `;
        document.head.appendChild(style);

        function gameLoop() {
            drawBackground();

            // Update and draw coins
            coins.forEach(coin => {
                coin.update();
                coin.draw();
            });

            // Update and draw animatronics
            animatronics.forEach(anim => {
                anim.update();
                anim.draw();
            });

            // Update and draw particles
            particles = particles.filter(p => {
                p.update();
                p.draw();
                return p.life > 0;
            });

            drawScore();
            checkWin();

            // Auto-spawn coins if low
            if (coins.filter(c => !c.collected).length < 5 && Math.random() < 0.02) {
                coins.push(new Coin());
            }

            gameTime++;
            requestAnimationFrame(gameLoop);
        }

        gameLoop();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
